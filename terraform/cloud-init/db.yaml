#cloud-config
hostname: gitops-db
manage_etc_hosts: true

users:
  - name: debian
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_public_key}

package_update: true

packages:
  - postgresql
  - postgresql-contrib
  - qemu-guest-agent

runcmd:
  - systemctl start postgresql
  - systemctl enable postgresql
  - |
    PGPASS=$(openssl rand -hex 16)
    sudo -u postgres psql -c "CREATE USER gitopsapp WITH PASSWORD '$${PGPASS}';" || true
    sudo -u postgres psql -c "CREATE DATABASE gitopsdb OWNER gitopsapp;" || true
    echo "Created DB: gitopsdb, User: gitopsapp, Pass: $${PGPASS}" >> /var/log/db_setup.log
  - |
    echo "listen_addresses = '*'" >> /etc/postgresql/15/main/postgresql.conf
    echo "host all all 0.0.0.0/0 md5" >> /etc/postgresql/15/main/pg_hba.conf
  - systemctl restart postgresql
  - systemctl start qemu-guest-agent

final_message: "PostgreSQL ready on :5432"