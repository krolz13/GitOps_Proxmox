#cloud-config
hostname: gitops-db
manage_etc_hosts: true

users:
  - name: debian
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo
    shell: /bin/bash

package_update: true

packages:
  - postgresql
  - postgresql-contrib
  - qemu-guest-agent

runcmd:
  - |
    echo "listen_addresses = '*'" >> /etc/postgresql/*/main/postgresql.conf
    echo "host all all 10.0.8.0/24 md5" >> /etc/postgresql/*/main/pg_hba.conf
    PGPASS=$(openssl rand -hex 16)
    echo "gitopsapp:${PGPASS}" | sudo -u postgres psql -c "CREATE USER gitopsapp WITH PASSWORD '${PGPASS}';"
    sudo -u postgres psql -c "CREATE DATABASE gitopsdb OWNER gitopsapp;"
    echo "Created DB: gitopsdb, User: gitopsapp, Pass: ${PGPASS}" >> /var/log/db_setup.log
  - systemctl restart postgresql
  - systemctl enable --now qemu-guest-agent

final_message: "PostgreSQL ready on :5432"
