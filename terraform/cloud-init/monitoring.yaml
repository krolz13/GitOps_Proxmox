#cloud-config
hostname: gitops-monitoring
manage_etc_hosts: true

users:
  - name: debian
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo
    shell: /bin/bash

package_update: true

packages:
  - prometheus
  - prometheus-node-exporter
  - grafana
  - qemu-guest-agent

runcmd:
  - systemctl enable --now prometheus
  - |
    cat <<'PROM' > /etc/prometheus/prometheus.yml
    scrape_configs:
      - job_name: 'node'
        static_configs:
          - targets:
            - 10.0.8.10:9100
            - 10.0.8.11:9100
            - 10.0.8.12:9100
            - 10.0.8.13:9100
      - job_name: 'gitops-app'
        static_configs:
          - targets: ['10.0.8.10:3000']
    PROM
  - systemctl restart prometheus
  - systemctl enable --now grafana-server
  - systemctl enable --now qemu-guest-agent

final_message: "Monitoring ready (Prometheus :9090, Grafana :3000)"
