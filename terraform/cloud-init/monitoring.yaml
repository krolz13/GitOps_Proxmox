#cloud-config
hostname: gitops-monitoring
manage_etc_hosts: true

users:
  - name: debian
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_public_key}

package_update: true

packages:
  - qemu-guest-agent
  - docker.io
  - docker-compose
  - curl

runcmd:
  - systemctl start qemu-guest-agent
  - systemctl enable qemu-guest-agent
  - systemctl start docker
  - systemctl enable docker
  - mkdir -p /opt/monitoring
  - |
    cat <<'COMPOSE' > /opt/monitoring/docker-compose.yml
    version: '3.8'
    services:
      prometheus:
        image: prom/prometheus:latest
        container_name: prometheus
        ports:
          - "9090:9090"
        volumes:
          - ./prometheus.yml:/etc/prometheus/prometheus.yml
          - prometheus-data:/prometheus
        command:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
        restart: unless-stopped

      grafana:
        image: grafana/grafana:latest
        container_name: grafana
        ports:
          - "3000:3000"
        volumes:
          - grafana-data:/var/lib/grafana
        environment:
          - GF_SECURITY_ADMIN_USER=admin
          - GF_SECURITY_ADMIN_PASSWORD=admin
        restart: unless-stopped

      node-exporter:
        image: prom/node-exporter:latest
        container_name: node-exporter
        ports:
          - "9100:9100"
        volumes:
          - /proc:/host/proc:ro
          - /sys:/host/sys:ro
          - /:/rootfs:ro
        command:
          - '--path.procfs=/host/proc'
          - '--path.sysfs=/host/sys'
          - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
        restart: unless-stopped

    volumes:
      prometheus-data:
      grafana-data:
    COMPOSE
  - |
    cat <<'PROM' > /opt/monitoring/prometheus.yml
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'node-exporter'
        static_configs:
          - targets: ['localhost:9100']
      - job_name: 'gitops-app'
        static_configs:
          - targets: ['192.168.8.189:3000']
      - job_name: 'gitops-db'
        static_configs:
          - targets: ['192.168.8.188:9100']
    PROM
  - cd /opt/monitoring && docker-compose up -d
  - systemctl enable docker

final_message: "Monitoring stack ready (Prometheus :9090, Grafana :3000, Node Exporter :9100)"