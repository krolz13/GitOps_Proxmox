  - path: /opt/gitops-app/views/about.ejs
    content: |
      <!DOCTYPE html>
      <html lang="en" data-theme="light">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="About GitOps Platform - Architecture and components">
        <title><%= title %></title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/style.css?v=2">
      </head>
      <body>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle dark/light mode">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>

        <header class="header">
          <nav class="nav container">
            <a href="/" class="nav-brand" aria-label="GitOps Platform Home">
              <svg class="logo" viewBox="0 0 32 32" fill="none" aria-hidden="true">
                <rect width="32" height="32" rx="8" fill="currentColor"/>
                <path d="M8 12h16M8 16h12M8 20h8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
              </svg>
              <span class="brand-text">GitOps Platform</span>
            </a>
            <ul class="nav-links">
              <li><a href="/" class="nav-link">Home</a></li>
              <li><a href="/about" class="nav-link active">About</a></li>
              <li><a href="/metrics" class="nav-link">Metrics</a></li>
            </ul>
          </nav>
        </header>

        <main class="about-content">
          <section class="about-section">
            <h1>About GitOps Platform</h1>
            <p>
              This application demonstrates a complete GitOps workflow for deploying and managing 
              infrastructure and applications. The entire platform is built on Proxmox VE using 
              Terraform for infrastructure provisioning, GitLab CI/CD for automated deployments, 
              and Prometheus/Grafana for observability.
            </p>
          </section>

          <section class="about-section">
            <h2>Architecture Overview</h2>
            <p>
              The platform consists of four isolated virtual machines, each with a specific role:
            </p>
            <ul>
              <li><strong>App VM (gitops-app):</strong> Runs the Node.js/Express web application on port 3000. Serves the home page, about page, and Prometheus metrics endpoint.</li>
              <li><strong>DB VM (gitops-db):</strong> Hosts PostgreSQL 15 database with the <code>gitopsdb</code> database. Accessible on port 5432.</li>
              <li><strong>Monitoring VM (gitops-monitoring):</strong> Runs Prometheus, Grafana, and Node Exporter via Docker Compose. Provides metrics collection, dashboards, and alerting.</li>
              <li><strong>Runner VM (gitops-runner):</strong> GitLab Runner with Docker executor for running CI/CD pipelines.</li>
            </ul>
          </section>

          <section class="about-section">
            <h2>Technology Stack</h2>
            <ul>
              <li><strong>Infrastructure:</strong> Proxmox VE 8, Terraform 1.5+, bpg/proxmox provider</li>
              <li><strong>Application:</strong> Node.js 18, Express 4, EJS templating</li>
              <li><strong>Database:</strong> PostgreSQL 15</li>
              <li><strong>CI/CD:</strong> GitLab CI/CD with Docker executor</li>
              <li><strong>Monitoring:</strong> Prometheus 2.47+, Grafana 10+, Node Exporter</li>
              <li><strong>Containerization:</strong> Docker 20.10+, Docker Compose v2</li>
              <li><strong>OS:</strong> Debian 12 (Bookworm) on all VMs</li>
            </ul>
          </section>

          <section class="about-section">
            <h2>GitOps Workflow</h2>
            <ol>
              <li><strong>Infrastructure Changes:</strong> Modify Terraform files → Commit to Git → GitLab CI runs <code>terraform plan</code> → Manual approval → <code>terraform apply</code></li>
              <li><strong>Application Changes:</strong> Modify application code → Create Merge Request → CI runs tests → Merge to main → CD pipeline deploys via rsync → Systemd restarts service</li>
              <li><strong>Monitoring Updates:</strong> Update Prometheus rules or Grafana dashboards → Commit → Manual trigger deploys new Docker Compose stack</li>
            </ol>
          </section>

          <section class="about-section">
            <h2>Network & Security</h2>
            <ul>
              <li>All VMs on the same bridge network (vmbr0) with DHCP</li>
              <li>QEMU Guest Agent enabled for IP discovery</li>
              <li>SSH key-based authentication only (no passwords)</li>
              <li>PostgreSQL configured for MD5 authentication from all IPs</li>
              <li>Grafana secured with admin/admin (change in production!)</li>
              <li>Prometheus metrics exposed on /metrics endpoints</li>
            </ul>
          </section>

          <section class="about-section">
            <h2>Access URLs</h2>
            <ul>
              <li><strong>App:</strong> http://192.168.8.194:3000</li>
              <li><strong>About Page:</strong> http://192.168.8.194:3000/about</li>
              <li><strong>Metrics:</strong> http://192.168.8.194:3000/metrics</li>
              <li><strong>Grafana:</strong> http://192.168.8.190:3000 (admin/admin)</li>
              <li><strong>Prometheus:</strong> http://192.168.8.190:9090</li>
              <li><strong>PostgreSQL:</strong> 192.168.8.188:5432 (db: gitopsdb, user: gitopsapp)</li>
            </ul>
          </section>

          <section class="about-section">
            <div style="text-align: center; margin-top: 2rem;">
              <a href="/" class="btn btn-secondary">← Back to Home</a>
            </div>
          </section>
        </main>

        <footer class="footer">
          <div class="container">
            <p>GitOps Platform - Deployed with <span class="heart">♥</span> via GitOps on Proxmox VE</p>
          </div>
        </footer>

        <script src="/app.js?v=2"></script>
      </body>
      </html>
  - path: /opt/gitops-app/public/style.css
    content: |
      /* ========================================
         GitOps Platform - Modern Design System v2
         ======================================== */

      :root {
        /* Color Palette - Light Theme */
        --color-primary: #2563eb;
        --color-primary-hover: #1d4ed8;
        --color-primary-light: #dbeafe;
        --color-primary-dark: #1e40af;
        
        --color-success: #10b981;
        --color-success-hover: #059669;
        --color-success-light: #d1fae5;
        
        --color-warning: #f59e0b;
        --color-warning-hover: #d97706;
        --color-warning-light: #fef3c7;
        
        --color-danger: #ef4444;
        --color-danger-hover: #dc2626;
        --color-danger-light: #fee2e2;
        
        --color-info: #06b6d4;
        --color-info-hover: #0891b2;
        --color-info-light: #cffafe;

        /* Neutral Colors */
        --color-bg: #f8fafc;
        --color-bg-elevated: #ffffff;
        --color-bg-card: #ffffff;
        --color-bg-hover: #f1f5f9;
        --color-bg-input: #ffffff;
        
        --color-text: #0f172a;
        --color-text-primary: #1e293b;
        --color-text-secondary: #64748b;
        --color-text-muted: #94a3b8;
        --color-text-inverse: #ffffff;
        
        --color-border: #e2e8f0;
        --color-border-light: #f1f5f9;
        --color-border-focus: #2563eb;
        
        /* Shadows */
        --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / 0.03);
        --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.08), 0 1px 2px -1px rgb(0 0 0 / 0.05);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.05);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.08), 0 8px 10px -6px rgb(0 0 0 / 0.05);
        --shadow-glow: 0 0 0 3px rgb(37 99 235 / 0.2);
        --shadow-glow-success: 0 0 0 3px rgb(16 185 129 / 0.2);
        --shadow-glow-warning: 0 0 0 3px rgb(245 158 11 / 0.2);
        --shadow-glow-danger: 0 0 0 3px rgb(239 68 68 / 0.2);

        /* Border Radius */
        --radius-xs: 0.25rem;
        --radius-sm: 0.375rem;
        --radius-md: 0.5rem;
        --radius-lg: 0.75rem;
        --radius-xl: 1rem;
        --radius-2xl: 1.5rem;
        --radius-full: 9999px;

        /* Transitions */
        --transition-fast: 150ms ease;
        --transition-base: 200ms ease;
        --transition-slow: 300ms ease;

        /* Typography */
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
        
        --text-xs: 0.7rem;
        --text-sm: 0.8125rem;
        --text-base: 0.9375rem;
        --text-lg: 1.0625rem;
        --text-xl: 1.25rem;
        --text-2xl: 1.5rem;
        --text-3xl: 2rem;
        --text-4xl: 2.5rem;
        --text-5xl: 3.5rem;

        /* Spacing */
        --space-1: 0.25rem;
        --space-2: 0.5rem;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --space-5: 1.25rem;
        --space-6: 1.5rem;
        --space-8: 2rem;
        --space-10: 2.5rem;
        --space-12: 3rem;
        --space-16: 4rem;
        --space-20: 5rem;

        /* Layout */
        --container-max: 1280px;
        --header-height: 64px;
        --progress-height: 3px;

        /* Z-index */
        --z-dropdown: 100;
        --z-sticky: 200;
        --z-fixed: 300;
        --z-modal-backdrop: 400;
        --z-modal: 500;
        --z-popover: 600;
        --z-tooltip: 700;
        --z-toast: 800;
      }

      /* Dark Theme */
      [data-theme="dark"] {
        --color-primary: #3b82f6;
        --color-primary-hover: #60a5fa;
        --color-primary-light: #1e3a5f;
        --color-primary-dark: #93c5fd;
        
        --color-success: #34d399;
        --color-success-hover: #6ee7b7;
        --color-success-light: #064e3b;
        
        --color-warning: #fbbf24;
        --color-warning-hover: #fcd34d;
        --color-warning-light: #451a03;
        
        --color-danger: #f87171;
        --color-danger-hover: #fca5a5;
        --color-danger-light: #450a0a;
        
        --color-info: #22d3ee;
        --color-info-hover: #67e8f9;
        --color-info-light: #164e63;

        --color-bg: #0f172a;
        --color-bg-elevated: #1e293b;
        --color-bg-card: #1e293b;
        --color-bg-hover: #334155;
        --color-bg-input: #1e293b;
        
        --color-text: #f8fafc;
        --color-text-primary: #f1f5f9;
        --color-text-secondary: #94a3b8;
        --color-text-muted: #64748b;
        --color-text-inverse: #0f172a;
        
        --color-border: #334155;
        --color-border-light: #1e293b;
        --color-border-focus: #3b82f6;
        
        --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / 0.3);
        --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.4), 0 1px 2px -1px rgb(0 0 0 / 0.3);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.3);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.4), 0 4px 6px -4px rgb(0 0 0 / 0.3);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.4), 0 8px 10px -6px rgb(0 0 0 / 0.3);
        --shadow-glow: 0 0 0 3px rgb(59 130 246 / 0.3);
        --shadow-glow-success: 0 0 0 3px rgb(52 211 153 / 0.3);
        --shadow-glow-warning: 0 0 0 3px rgb(251 191 36 / 0.3);
        --shadow-glow-danger: 0 0 0 3px rgb(248 113 113 / 0.3);
      }

      /* ========================================
         Reset & Base
         ======================================== */

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 16px;
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-sans);
        font-size: var(--text-base);
        line-height: 1.6;
        color: var(--color-text);
        background-color: var(--color-bg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        transition: background-color var(--transition-base), color var(--transition-base);
      }

      a {
        color: var(--color-primary);
        text-decoration: none;
        transition: color var(--transition-fast);
      }

      a:hover {
        color: var(--color-primary-hover);
      }

      img, svg {
        display: block;
        max-width: 100%;
        height: auto;
      }

      button {
        font-family: inherit;
        font-size: inherit;
        cursor: pointer;
        border: none;
        background: none;
      }

      /* Focus Visible */
      :focus-visible {
        outline: 2px solid var(--color-border-focus);
        outline-offset: 2px;
      }

      /* Selection */
      ::selection {
        background: var(--color-primary-light);
        color: var(--color-primary-dark);
      }

      [data-theme="dark"] ::selection {
        background: var(--color-primary-dark);
        color: var(--color-bg);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--color-bg);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: var(--radius-full);
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-text-muted);
      }

      /* ========================================
         Layout Components
         ======================================== */

      .container {
        width: 100%;
        max-width: var(--container-max);
        margin: 0 auto;
        padding: 0 var(--space-6);
      }

      /* Progress Bar */
      .progress-bar {
        position: fixed;
        top: 0;
        left: 0;
        height: var(--progress-height);
        background: linear-gradient(90deg, var(--color-primary), var(--color-info));
        transform-origin: left;
        transform: scaleX(0);
        z-index: var(--z-fixed);
        transition: transform 0.2s ease-out;
      }

      .progress-bar.loading {
        transform: scaleX(1);
      }

      /* Header */
      .header {
        position: sticky;
        top: 0;
        z-index: var(--z-sticky);
        background: var(--color-bg-elevated);
        border-bottom: 1px solid var(--color-border);
        backdrop-filter: blur(8px);
        background: rgba(var(--color-bg-elevated), 0.9);
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: var(--header-height);
        gap: var(--space-4);
      }

      .nav-brand {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        text-decoration: none;
        color: var(--color-text-primary);
        font-weight: 700;
        font-size: var(--text-lg);
        padding: var(--space-2) var(--space-3);
        border-radius: var(--radius-lg);
        transition: background var(--transition-fast);
      }

      .nav-brand:hover {
        background: var(--color-bg-hover);
        color: var(--color-primary);
      }

      .logo {
        width: 36px;
        height: 36px;
        color: var(--color-primary);
        flex-shrink: 0;
      }

      .brand-text {
        font-weight: 800;
        letter-spacing: -0.025em;
      }

      .version-badge {
        font-size: var(--text-xs);
        font-weight: 600;
        padding: 2px 8px;
        background: var(--color-primary-light);
        color: var(--color-primary-dark);
        border-radius: var(--radius-full);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      [data-theme="dark"] .version-badge {
        background: var(--color-primary-light);
        color: var(--color-primary-dark);
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        list-style: none;
      }

      .nav-link {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        padding: var(--space-2) var(--space-4);
        border-radius: var(--radius-md);
        font-weight: 500;
        font-size: var(--text-sm);
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }

      .nav-link:hover {
        color: var(--color-text-primary);
        background: var(--color-bg-hover);
      }

      .nav-link.active {
        color: var(--color-primary);
        background: var(--color-primary-light);
      }

      [data-theme="dark"] .nav-link.active {
        background: var(--color-primary-light);
      }

      .nav-link.external {
        display: flex;
        align-items: center;
        gap: var(--space-1);
      }

      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: var(--radius-md);
        color: var(--color-text-secondary);
        background: var(--color-bg-hover);
        transition: all var(--transition-fast);
      }

      .theme-toggle:hover {
        background: var(--color-primary-light);
        color: var(--color-primary);
      }

      .theme-toggle svg {
        width: 20px;
        height: 20px;
      }

      .icon-sun {
        display: none;
      }

      .icon-moon {
        display: block;
      }

      [data-theme="dark"] .icon-sun {
        display: block;
      }

      [data-theme="dark"] .icon-moon {
        display: none;
      }

      /* Main Content */
      #mainContent {
        flex: 1;
        width: 100%;
      }

      /* ========================================
         Buttons
         ======================================== */

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        padding: var(--space-3) var(--space-5);
        font-size: var(--text-sm);
        font-weight: 600;
        border-radius: var(--radius-md);
        text-decoration: none;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }

      .btn svg {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      .btn-primary {
        background: var(--color-primary);
        color: white;
        box-shadow: var(--shadow-sm);
      }

      .btn-primary:hover {
        background: var(--color-primary-hover);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      .btn-secondary {
        background: var(--color-bg-card);
        color: var(--color-text-primary);
        border: 1px solid var(--color-border);
      }

      .btn-secondary:hover {
        background: var(--color-bg-hover);
        border-color: var(--color-primary);
        color: var(--color-primary);
      }

      .btn-ghost {
        background: transparent;
        color: var(--color-text-secondary);
      }

      .btn-ghost:hover {
        background: var(--color-bg-hover);
        color: var(--color-text-primary);
      }

      .btn-danger {
        background: var(--color-danger-light);
        color: var(--color-danger);
      }

      .btn-danger:hover {
        background: var(--color-danger);
        color: white;
      }

      .btn-sm {
        padding: var(--space-2) var(--space-3);
        font-size: var(--text-xs);
      }

      .btn-lg {
        padding: var(--space-4) var(--space-8);
        font-size: var(--text-base);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
      }

      /* ========================================
         Badges
         ======================================== */

      .badge {
        display: inline-flex;
        align-items: center;
        padding: var(--space-1) var(--space-3);
        font-size: var(--text-xs);
        font-weight: 600;
        border-radius: var(--radius-full);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .badge-primary {
        background: var(--color-primary-light);
        color: var(--color-primary-dark);
      }

      .badge-success {
        background: var(--color-success-light);
        color: var(--color-success-hover);
      }

      .badge-warning {
        background: var(--color-warning-light);
        color: var(--color-warning-hover);
      }

      .badge-danger {
        background: var(--color-danger-light);
        color: var(--color-danger-hover);
      }

      .badge-info {
        background: var(--color-info-light);
        color: var(--color-info-hover);
      }

      /* ========================================
         Typography
         ======================================== */

      .section-title {
        font-size: var(--text-2xl);
        font-weight: 800;
        color: var(--color-text-primary);
        letter-spacing: -0.02em;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-4);
        margin-bottom: var(--space-8);
        flex-wrap: wrap;
      }

      /* ========================================
         Hero Section
         ======================================== */

      .hero {
        padding: var(--space-16) 0 var(--space-12);
        background: linear-gradient(180deg, var(--color-bg-card) 0%, var(--color-bg) 100%);
        border-bottom: 1px solid var(--color-border);
      }

      .hero-grid {
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: var(--space-8);
        align-items: start;
      }

      .hero-badges {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-bottom: var(--space-4);
      }

      .hero-title {
        font-size: var(--text-5xl);
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -0.03em;
        color: var(--color-text-primary);
        margin-bottom: var(--space-4);
      }

      .hero-title-main {
        display: block;
      }

      .hero-title-sub {
        display: block;
        color: var(--color-primary);
        font-weight: 800;
      }

      .hero-description {
        font-size: var(--text-lg);
        color: var(--color-text-secondary);
        line-height: 1.7;
        max-width: 580px;
        margin-bottom: var(--space-6);
      }

      .hero-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: var(--space-3);
        margin-bottom: var(--space-6);
        padding: var(--space-4);
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
      }

      .stat-card {
        text-align: center;
        padding: var(--space-2);
        border-radius: var(--radius-md);
        transition: background var(--transition-fast);
      }

      .stat-card:hover {
        background: var(--color-bg-hover);
      }

      .stat-value {
        display: block;
        font-size: var(--text-2xl);
        font-weight: 800;
        color: var(--color-text-primary);
        line-height: 1.2;
      }

      .stat-label {
        display: block;
        font-size: var(--text-xs);
        font-weight: 500;
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-top: var(--space-1);
      }

      .hero-description {
        font-size: var(--text-lg);
        color: var(--color-text-secondary);
        line-height: 1.7;
        max-width: 580px;
        margin-bottom: var(--space-6);
      }

      .hero-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: var(--space-3);
        margin-bottom: var(--space-6);
        padding: var(--space-4);
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
      }

      .stat-card {
        text-align: center;
        padding: var(--space-2);
        border-radius: var(--radius-md);
        transition: background var(--transition-fast);
      }

      .stat-card:hover {
        background: var(--color-bg-hover);
      }

      .stat-value {
        display: block;
        font-size: var(--text-2xl);
        font-weight: 800;
        color: var(--color-text-primary);
        line-height: 1.2;
      }

      .stat-label {
        display: block;
        font-size: var(--text-xs);
        font-weight: 500;
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-top: var(--space-1);
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
      }

      /* Hero Panel */
      .hero-panel {
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        position: sticky;
        top: calc(var(--header-height) + var(--space-6));
        max-height: calc(100vh - var(--header-height) - var(--space-12));
        overflow-y: auto;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-4);
        border-bottom: 1px solid var(--color-border);
      }

      .panel-title {
        font-size: var(--text-lg);
        font-weight: 700;
        color: var(--color-text-primary);
      }

      .panel-status {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        font-size: var(--text-sm);
        font-weight: 500;
        color: var(--color-text-secondary);
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        transition: all var(--transition-base);
      }

      .status-dot.status-online {
        background: var(--color-success);
        box-shadow: 0 0 0 3px var(--color-success-light);
      }

      .status-dot.status-offline {
        background: var(--color-danger);
        box-shadow: 0 0 0 3px var(--color-danger-light);
      }

      .status-dot.status-checking {
        background: var(--color-warning);
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.1); }
      }

      .panel-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-4);
      }

      .info-item {
        padding: var(--space-3);
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        transition: all var(--transition-fast);
      }

      .info-item:hover {
        border-color: var(--color-primary);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      .info-label {
        display: block;
        font-size: var(--text-xs);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--color-text-muted);
        margin-bottom: var(--space-1);
      }

      .info-value {
        display: block;
        font-family: var(--font-mono);
        font-size: var(--text-sm);
        font-weight: 500;
        color: var(--color-text-primary);
        word-break: break-all;
      }

      /* Architecture Section */
      .architecture-section {
        margin-top: var(--space-16);
        padding-top: var(--space-12);
        border-top: 1px solid var(--color-border);
      }

      .topology {
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        overflow: hidden;
      }

      .topology-layer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-6);
        padding: var(--space-6);
        flex-wrap: wrap;
      }

      .topology-layer.vm-layer {
        background: var(--color-bg);
        border-top: 1px solid var(--color-border);
      }

      .topology-node {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-3);
        padding: var(--space-4) var(--space-5);
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        min-width: 140px;
        transition: all var(--transition-base);
        position: relative;
      }

      .topology-node:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-xl);
        border-color: var(--color-primary);
      }

      .topology-node.node-source {
        border-color: #fc6d26;
        background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
      }

      [data-theme="dark"] .topology-node.node-source {
        background: linear-gradient(135deg, #431d05 0%, #7c2d12 100%);
      }

      .topology-node.node-process {
        border-color: #5b4fe5;
        background: linear-gradient(135deg, #f0f0ff 0%, #e5e5ff 100%);
      }

      [data-theme="dark"] .topology-node.node-process {
        background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      }

      .topology-node.node-target {
        border-color: #e57000;
        background: linear-gradient(135deg, #fff7ed 0%, #fed7aa 100%);
      }

      [data-theme="dark"] .topology-node.node-target {
        background: linear-gradient(135deg, #431d05 0%, #7c2d12 100%);
      }

      .topology-node.node-vm {
        border-color: var(--color-primary);
        background: var(--color-bg-card);
        flex-direction: row;
        text-align: left;
        gap: var(--space-4);
        min-width: 0;
      }

      .topology-node.node-vm:hover {
        border-color: var(--color-primary);
      }

      .node-icon {
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        color: var(--color-primary);
      }

      .node-icon svg {
        width: 22px;
        height: 22px;
      }

      .node-source .node-icon { color: #fc6d26; }
      .node-process .node-icon { color: #5b4fe5; }
      .node-target .node-icon { color: #e57000; }
      .node-vm .node-icon { color: var(--color-primary); }

      .node-label {
        font-size: var(--text-sm);
        font-weight: 600;
        color: var(--color-text-primary);
        white-space: nowrap;
      }

      .node-status {
        font-size: var(--text-xs);
        font-weight: 600;
        padding: 2px 8px;
        border-radius: var(--radius-full);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .node-status.online {
        background: var(--color-success-light);
        color: var(--color-success-hover);
      }

      .vm-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: var(--space-4);
        padding: var(--space-6);
      }

      .node-vm .vm-info {
        flex: 1;
        min-width: 0;
      }

      .vm-name {
        display: block;
        font-weight: 700;
        font-size: var(--text-sm);
        color: var(--color-text-primary);
        margin-bottom: 2px;
      }

      .vm-ip {
        display: block;
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        color: var(--color-text-muted);
        margin-bottom: var(--space-2);
      }

      .vm-ports {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-1);
      }

      .port {
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        padding: 2px 6px;
        background: var(--color-primary-light);
        color: var(--color-primary-dark);
        border-radius: var(--radius-sm);
      }

      [data-theme="dark"] .port {
        background: var(--color-primary-light);
        color: var(--color-primary-dark);
      }

      .topology-connector {
        width: 40px;
        height: 2px;
        background: linear-gradient(90deg, var(--color-border), var(--color-primary), var(--color-border));
        border-radius: 1px;
        flex-shrink: 0;
      }

      /* ========================================
         Section Styles
         ======================================== */

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-4);
        margin-bottom: var(--space-8);
        flex-wrap: wrap;
      }

      .section-title {
        font-size: var(--text-2xl);
        font-weight: 800;
        color: var(--color-text-primary);
        letter-spacing: -0.02em;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-4);
        margin-bottom: var(--space-8);
        flex-wrap: wrap;
      }

      .section-title {
        font-size: var(--text-2xl);
        font-weight: 800;
        color: var(--color-text-primary);
        letter-spacing: -0.02em;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-4);
        margin-bottom: var(--space-8);
        flex-wrap: wrap;
      }

      .section-title {
        font-size: var(--text-2xl);
        font-weight: 800;
        color: var(--color-text-primary);
        letter-spacing: -0.02em.
      }

      .section-actions {
        display: flex;
        align-items: center;
        gap: var(--space-3);
      }

      .last-updated {
        font-size: var(--text-xs);
        color: var(--color-text-muted);
        font-family: var(--font-mono);
      }

      /* ========================================
         Services Grid
         ======================================== */

      .services-section {
        padding: var(--space-12) 0;
      }

      .services-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: var(--space-5);
      }

      .service-card {
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        padding: var(--space-5);
        transition: all var(--transition-base);
        position: relative;
        overflow: hidden;
      }

      .service-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--color-border);
        transition: background var(--transition-base);
      }

      .service-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
        border-color: var(--color-primary);
      }

      .service-card:hover::before {
        background: linear-gradient(90deg, var(--color-primary), var(--color-info));
      }

      .service-card.healthy::before {
        background: var(--color-success);
      }

      .service-card.unhealthy::before {
        background: var(--color-danger);
      }

      .service-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: var(--space-3);
        margin-bottom: var(--space-4);
      }

      .service-icon {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        flex-shrink: 0;
        color: var(--color-primary);
      }

      .service-icon svg {
        width: 22px;
        height: 22px;
      }

      .service-card.healthy .service-icon {
        background: var(--color-success-light);
        color: var(--color-success);
        border-color: var(--color-success);
      }

      .service-card.unhealthy .service-icon {
        background: var(--color-danger-light);
        color: var(--color-danger);
        border-color: var(--color-danger);
      }

      .service-info {
        flex: 1;
        min-width: 0;
      }

      .service-name {
        display: block;
        font-weight: 700;
        font-size: var(--text-base);
        color: var(--color-text-primary);
        margin-bottom: var(--space-1);
      }

      .service-url {
        display: block;
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        color: var(--color-text-muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .service-status {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        padding: var(--space-1) var(--space-3);
        border-radius: var(--radius-full);
        font-size: var(--text-xs);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }

      .service-status.healthy {
        background: var(--color-success-light);
        color: var(--color-success-hover);
      }

      .service-status.unhealthy {
        background: var(--color-danger-light);
        color: var(--color-danger-hover);
      }

      .service-status.checking {
        background: var(--color-warning-light);
        color: var(--color-warning-hover);
      }

      .status-indicator {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        animation: pulse 1.5s ease-in-out infinite;
      }

      .service-status.healthy .status-indicator {
        background: var(--color-success);
        box-shadow: 0 0 0 3px var(--color-success-light);
      }

      .service-status.unhealthy .status-indicator {
        background: var(--color-danger);
        box-shadow: 0 0 0 3px var(--color-danger-light);
      }

      .service-status.checking .status-indicator {
        background: var(--color-warning);
      }

      .service-details {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: var(--space-3);
        padding-top: var(--space-4);
        border-top: 1px solid var(--color-border);
      }

      .detail-item {
        padding: var(--space-2);
        background: var(--color-bg);
        border-radius: var(--radius-md);
      }

      .detail-label {
        display: block;
        font-size: var(--text-xs);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--color-text-muted);
        margin-bottom: var(--space-1);
      }

      .detail-value {
        font-family: var(--font-mono);
        font-size: var(--text-sm);
        font-weight: 500;
        color: var(--color-text-primary);
      }

      /* ========================================
         Metrics Grid
         ======================================== */

      .metrics-section {
        padding: var(--space-12) 0;
      }

      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: var(--space-5);
      }

      .metric-card {
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        padding: var(--space-5);
        display: flex;
        align-items: center;
        gap: var(--space-4);
        transition: all var(--transition-base);
      }

      .metric-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
        border-color: var(--color-primary);
      }

      .metric-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center
        background: var(--color-primary-light);
        color: var(--color-primary);
        border-radius: var(--radius-lg);
        flex-shrink: 0;
      }

      .metric-icon svg {
        width: 24px;
        height: 24px;
      }

      .metric-card[data-metric="memory"] .metric-icon {
        background: var(--color-warning-light);
        color: var(--color-warning);
      }

      .metric-card[data-metric="cpu"] .metric-icon {
        background: var(--color-info-light);
        color: var(--color-info);
      }

      .metric-card[data-metric="uptime"] .metric-icon {
        background: var(--color-success-light);
        color: var(--color-success);
      }

      .metric-content {
        flex: 1;
        min-width: 0;
      }

      .metric-label {
        display: block;
        font-size: var(--text-sm);
        font-weight: 500;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-1);
      }

      .metric-value {
        display: block
        font-family: var(--font-mono)
        font-size: var(--text-2xl)
        font-weight: 700
        color: var(--color-text-primary)
        line-height: 1.2
      }

      /* ========================================
         Quick Links
         ======================================== */

      .quick-links {
        padding: var(--space-12) 0 var(--space-16);
        background: var(--color-bg-card);
        border-top: 1px solid var(--color-border);
      }

      .links-grid {
        display: grid
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr))
        gap: var(--space-5)
      }

      .link-card {
        display: flex
        align-items: center
        gap: var(--space-4)
        padding: var(--space-5)
        background: var(--color-bg)
        border: 1px solid var(--color-border)
        border-radius: var(--radius-xl)
        text-decoration: none
        color: inherit
        transition: all var(--transition-base)
      }

      .link-card:hover {
        transform: translateY(-2px)
        box-shadow: var(--shadow-lg)
        border-color: var(--color-primary)
        background: var(--color-bg-card)
      }

      .link-icon {
        width: 48px
        height: 48px
        display: flex
        align-items: center
        justify-content: center
        background: var(--color-bg-card)
        border: 1px solid var(--color-border)
        border-radius: var(--radius-lg)
        flex-shrink: 0
        color: var(--color-primary)
      }

      .link-icon svg {
        width: 24px
        height: 24px
      }

      .link-card.grafana .link-icon { color: #f46800; }
      .link-card.prometheus .link-icon { color: #e57000; }
      .link-card.gitlab .link-icon { color: #fc6d26; }
      .link-card.api .link-icon { color: var(--color-primary); }

      .link-info {
        flex: 1
        min-width: 0
      }

      .link-name {
        display: block
        font-weight: 700
        font-size: var(--text-base)
        color: var(--color-text-primary)
        margin-bottom: 2px
      }

      .link-desc {
        display: block
        font-size: var(--text-sm)
        color: var(--color-text-muted)
      }

      .link-url {
        display: block
        font-family: var(--font-mono)
        font-size: var(--text-xs)
        color: var(--color-text-muted)
        padding: var(--space-1) var(--space-2)
        background: var(--color-bg-card)
        border: 1px solid var(--color-border)
        border-radius: var(--radius-sm)
        white-space: nowrap
      }

      /* ========================================
         Footer
         ======================================== */

      .footer {
        background: var(--color-bg-card)
        border-top: 1px solid var(--color-border)
        padding: var(--space-12) 0 var(--space-6)
        margin-top: auto
      }

      .footer-grid {
        display: grid
        grid-template-columns: 2fr repeat(3, 1fr)
        gap: var(--space-8)
        margin-bottom: var(--space-8)
      }

      .footer-brand .nav-brand {
        font-size: var(--text-xl)
      }

      .footer-tagline {
        margin-top: var(--space-3)
        color: var(--color-text-muted)
        font-size: var(--text-sm)
        line-height: 1.6
      }

      .footer-nav {
        display: grid
        grid-template-columns: repeat(3, 1fr)
        gap: var(--space-6)
      }

      .footer-col h4 {
        font-size: var(--text-sm)
        font-weight: 700
        text-transform: uppercase
        letter-spacing: 0.05em
        color: var(--color-text-muted)
        margin-bottom: var(--space-3)
      }

      .footer-col ul {
        list-style: none
      }

      .footer-col li {
        margin-bottom: var(--space-2)
      }

      .footer-col a {
        font-size: var(--text-sm)
        color: var(--color-text-secondary)
        transition: color var(--transition-fast)
      }

      .footer-col a:hover {
        color: var(--color-primary)
      }

      .footer-bottom {
        display: flex
        align-items: center
        justify-content: space-between
        padding-top: var(--space-6)
        border-top: 1px solid var(--color-border)
        flex-wrap: wrap
        gap: var(--space-4)
      }

      .copyright {
        font-size: var(--text-sm)
        color: var(--color-text-muted)
      }

      .heart {
        color: var(--color-danger)
        animation: heartbeat 1.5s ease-in-out infinite
      }

      @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.2); }
      }

      .footer-links {
        display: flex
        align-items: center
        gap: var(--space-6)
      }

      .footer-links a {
        font-size: var(--text-sm)
        color: var(--color-text-muted)
        transition: color var(--transition-fast)
      }

      .footer-links a:hover {
        color: var(--color-primary)
      }

      /* ========================================
         Toast Notifications
         ======================================== */

      .toast-container {
        position: fixed
        bottom: var(--space-6)
        right: var(--space-6)
        z-index: var(--z-toast)
        display: flex
        flex-direction: column
        gap: var(--space-3)
        max-width: 380px
      }

      .toast {
        display: flex
        align-items: flex-start
        gap: var(--space-3)
        padding: var(--space-4)
        background: var(--color-bg-card)
        border: 1px solid var(--color-border)
        border-radius: var(--radius-lg)
        box-shadow: var(--shadow-xl)
        animation: slideIn 0.3s ease-out
      }

      @keyframes slideIn {
        from {
          opacity: 0
          transform: translateX(100%)
        }
        to {
          opacity: 1
          transform: translateX(0)
        }
      }

      .toast.success {
        border-left: 4px solid var(--color-success)
      }

      .toast.error {
        border-left: 4px solid var(--color-danger)
      }

      .toast.warning {
        border-left: 4px solid var(--color-warning)
      }

      .toast.info {
        border-left: 4px solid var(--color-info)
      }

      .toast-icon {
        width: 20px
        height: 20px
        flex-shrink: 0
        margin-top: 2px
      }

      .toast.success .toast-icon { color: var(--color-success); }
      .toast.error .toast-icon { color: var(--color-danger); }
      .toast.warning .toast-icon { color: var(--color-warning); }
      .toast.info .toast-icon { color: var(--color-info); }

      .toast-content {
        flex: 1
        min-width: 0
      }

      .toast-title {
        font-weight: 600
        font-size: var(--text-sm)
        color: var(--color-text-primary)
        margin-bottom: var(--space-1)
      }

      .toast-message {
        font-size: var(--text-sm)
        color: var(--color-text-secondary)
        line-height: 1.5
      }

      .toast-close {
        width: 24px
        height: 24px
        display: flex
        align-items: center
        justify-content: center
        color: var(--color-text-muted)
        border-radius: var(--radius-sm)
        transition: all var(--transition-fast)
      }

      .toast-close:hover {
        background: var(--color-bg-hover)
        color: var(--color-text-primary)
      }

      /* ========================================
         Animations
         ======================================== */

      @keyframes fadeInUp {
        from {
          opacity: 0
          transform: translateY(20px)
        }
        to {
          opacity: 1
          transform: translateY(0)
        }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .hero-content,
      .hero-panel,
      .feature-card,
      .service-card,
      .metric-card,
      .link-card {
        animation: fadeInUp 0.6s ease forwards;
        opacity: 0;
      }

      .hero-content { animation-delay: 0.1s; }
      .hero-panel { animation-delay: 0.2s; }

      .feature-card:nth-child(1) { animation-delay: 0.1s; }
      .feature-card:nth-child(2) { animation-delay: 0.15s; }
      .feature-card:nth-child(3) { animation-delay: 0.2s; }
      .feature-card:nth-child(4) { animation-delay: 0.25s; }

      .service-card:nth-child(1) { animation-delay: 0.1s; }
      .service-card:nth-child(2) { animation-delay: 0.15s; }
      .service-card:nth-child(3) { animation-delay: 0.2s; }
      .service-card:nth-child(4) { animation-delay: 0.25s; }
      .service-card:nth-child(5) { animation-delay: 0.3s; }
      .service-card:nth-child(6) { animation-delay: 0.35s; }
      .service-card:nth-child(7) { animation-delay: 0.4s; }
      .service-card:nth-child(8) { animation-delay: 0.45s; }

      .metric-card:nth-child(1) { animation-delay: 0.1s; }
      .metric-card:nth-child(2) { animation-delay: 0.15s; }
      .metric-card:nth-child(3) { animation-delay: 0.2s; }
      .metric-card:nth-child(4) { animation-delay: 0.25s; }

      .link-card:nth-child(1) { animation-delay: 0.1s; }
      .link-card:nth-child(2) { animation-delay: 0.15s; }
      .link-card:nth-child(3) { animation-delay: 0.2s; }
      .link-card:nth-child(4) { animation-delay: 0.25s; }

      /* Loading States */
      .loading-skeleton {
        background: linear-gradient(
          90deg,
          var(--color-bg) 25%,
          var(--color-bg-hover) 50%,
          var(--color-bg) 75%
        )
        background-size: 200% 100%
        animation: shimmer 1.5s infinite
        border-radius: var(--radius-md)
      }

      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* ========================================
         Responsive
         ======================================== */

      @media (max-width: 1024px) {
        .hero-grid {
          grid-template-columns: 1fr;
        }
        
        .hero-panel {
          position: static;
          max-height: none;
          order: -1;
        }
        
        .hero-stats {
          grid-template-columns: repeat(2, 1fr);
        }
        
        .footer-grid {
          grid-template-columns: 1fr 1fr;
        }
        
        .footer-brand {
          grid-column: 1 / -1;
        }
        
        .topology-layer {
          flex-direction: column;
          gap: var(--space-4);
        }
        
        .topology-connector {
          width: 2px;
          height: 40px;
          background: linear-gradient(180deg, var(--color-border), var(--color-primary), var(--color-border));
        }
      }

      @media (max-width: 768px) {
        :root {
          --text-5xl: 2.5rem;
          --text-4xl: 2rem;
          --text-3xl: 1.75rem;
        }
        
        .container {
          padding: 0 var(--space-4);
        }
        
        .nav-links {
          display: none;
        }
        
        .hero {
          padding: var(--space-10) 0 var(--space-8);
        }
        
        .hero-stats {
          grid-template-columns: repeat(2, 1fr);
        }
        
        .hero-actions {
          flex-direction: column;
        }
        
        .hero-actions .btn {
          width: 100%;
        }
        
        .panel-grid {
          grid-template-columns: 1fr;
        }
        
        .service-details {
          grid-template-columns: 1fr;
        }
        
        .metrics-grid {
          grid-template-columns: 1fr;
        }
        
        .links-grid {
          grid-template-columns: 1fr;
        }
        
        .footer-grid {
          grid-template-columns: 1fr;
        }
        
        .footer-nav {
          grid-template-columns: 1fr;
        }
        
        .footer-bottom {
          flex-direction: column;
          text-align: center;
        }
        
        .footer-links {
          flex-wrap: wrap;
          justify-content: center;
        }
        
        .vm-grid {
          grid-template-columns: 1fr;
        }
        
        .topology-node.node-vm {
          flex-direction: column;
          text-align: center;
          min-width: 100%;
        }
      }

      @media (max-width: 480px) {
        .hero-stats {
          grid-template-columns: 1fr;
        }
        
        .btn {
          width: 100%;
        }
        
        .btn-secondary {
          order: -1;
        }
      }

      /* ========================================
         Reduced Motion
         ======================================== */

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
        
        .status-indicator {
          animation: none;
        }
        
        .status-dot.status-checking {
          animation: none;
        }
        
        .heart {
          animation: none;
        }
      }

      /* ========================================
         Print Styles
         ======================================== */

      @media print {
        .header,
        .theme-toggle,
        .hero-actions,
        .services-section,
        .metrics-section,
        .quick-links,
        .footer,
        .toast-container,
        .progress-bar {
          display: none !important;
        }
        
        body {
          background: white !important;
          color: black !important;
        }
        
        .hero {
          padding: 0 !important;
          background: none !important;
          border: none !important;
        }
        
        .service-card,
        .metric-card,
        .link-card {
          break-inside: avoid;
          box-shadow: none !important;
          border: 1px solid #ccc !important;
        }
      }