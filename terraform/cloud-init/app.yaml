#cloud-config
hostname: gitops-app
manage_etc_hosts: true

users:
  - name: debian
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_public_key}

package_update: true

packages:
  - nodejs
  - npm
  - prometheus-node-exporter
  - qemu-guest-agent

write_files:
  - path: /opt/gitops-app/package.json
    content: |
      {
        "name": "gitops-app",
        "version": "2.0.0",
        "description": "GitOps Platform Dashboard",
        "main": "src/server.js",
        "scripts": {
          "start": "node src/server.js",
          "dev": "nodemon src/server.js"
        },
        "dependencies": {
          "express": "^4.18.2",
          "ejs": "^3.1.9"
        },
        "devDependencies": {
          "nodemon": "^3.0.2"
        }
      }
  - path: /opt/gitops-app/src/server.js
    content: |
      const express = require('express');
      const path = require('path');
      const os = require('os');
      const app = express();
      const PORT = process.env.PORT || 3000;

      app.set('view engine', 'ejs');
      app.set('views', path.join(__dirname, '..', 'views'));
      app.use(express.static(path.join(__dirname, '..', 'public')));
      app.use(express.json());

      // System info endpoint for dashboard
      app.get('/api/system', (req, res) => {
        const uptime = os.uptime();
        const days = Math.floor(uptime / 86400);
        const hours = Math.floor((uptime % 86400) / 3600);
        const minutes = Math.floor((uptime % 3600) / 60);
        
        res.json({
          hostname: os.hostname(),
          platform: os.platform(),
          arch: os.arch(),
          uptime: { days, hours, minutes, seconds: Math.floor(uptime % 60) },
          loadavg: os.loadavg(),
          memory: {
            total: Math.round(os.totalmem() / 1024 / 1024),
            free: Math.round(os.freemem() / 1024 / 1024),
            used: Math.round((os.totalmem() - os.freemem()) / 1024 / 1024)
          },
          cpus: os.cpus().length,
          networkInterfaces: Object.keys(os.networkInterfaces()).filter(
            k => !os.networkInterfaces()[k].some(i => i.internal)
          ).map(k => ({
            name: k,
            addresses: os.networkInterfaces()[k]
              .filter(i => i.family === 'IPv4' && !i.internal)
              .map(i => i.address)
          })),
          nodeVersion: process.version,
          pid: process.pid,
          memoryUsage: {
            rss: Math.round(process.memoryUsage().rss / 1024 / 1024),
            heapUsed: Math.round(process.memoryUsage().heapUsed / 1024 / 1024),
            heapTotal: Math.round(process.memoryUsage().heapTotal / 1024 / 1024)
          }
        });
      });

      // Services status endpoint
      app.get('/api/services', async (req, res) => {
        const services = [
          { name: 'App Service', url: 'http://localhost:3000', port: 3000 },
          { name: 'PostgreSQL', url: 'http://192.168.8.188:5432', port: 5432 },
          { name: 'Prometheus', url: 'http://192.168.8.190:9090', port: 9090 },
          { name: 'Grafana', url: 'http://192.168.8.190:3000', port: 3000 },
          { name: 'Node Exporter (App)', url: 'http://localhost:9100', port: 9100 },
          { name: 'Node Exporter (DB)', url: 'http://192.168.8.188:9100', port: 9100 },
          { name: 'Node Exporter (Mon)', url: 'http://192.168.8.190:9100', port: 9100 },
          { name: 'GitLab Runner', url: 'http://192.168.8.170', port: 80 }
        ];

        const results = await Promise.all(services.map(async (svc) => {
          try {
            if (svc.port) {
              const net = require('net');
              await new Promise((resolve, reject) => {
                const socket = new (require('net')).Socket();
                socket.setTimeout(2000);
                socket.connect(svc.port, svc.url.replace('http://', ''), () => {
                  socket.destroy();
                  resolve(true);
                });
                socket.on('error', () => reject(new Error('Connection failed')));
                socket.on('timeout', () => { socket.destroy(); reject(new Error('Timeout')); });
              });
            }
            return { ...svc, status: 'healthy', lastCheck: new Date().toISOString() };
          } catch (e) {
            return { ...svc, status: 'unhealthy', lastCheck: new Date().toISOString(), error: e.message };
          }
        }));
        res.json(results);
      });

      // Main routes
      app.get('/', (req, res) => {
        res.render('index', { 
          title: 'GitOps Platform Dashboard',
          version: '2.0.0'
        });
      });

      app.get('/about', (req, res) => {
        res.render('about', { title: 'About - GitOps Platform' });
      });

      app.get('/metrics', (req, res) => {
        res.set('Content-Type', 'text/plain; version=0.0.4');
        const mem = process.memoryUsage();
        res.send([
          '# HELP http_requests_total Total HTTP requests',
          '# TYPE http_requests_total counter',
          'http_requests_total{method="GET",path="/"} 1',
          '# HELP process_memory_bytes Process memory usage',
          '# TYPE process_memory_bytes gauge',
          `process_memory_bytes{type="rss"} $${mem.rss}`,
          `process_memory_bytes{type="heap_used"} $${mem.heapUsed}`,
          `process_memory_bytes{type="heap_total"} $${mem.heapTotal}`,
          '# HELP process_uptime_seconds Process uptime in seconds',
          '# TYPE process_uptime_seconds gauge',
          `process_uptime_seconds $${process.uptime()}`,
          '# HELP nodejs_version_info Node.js version info',
          '# TYPE nodejs_version_info gauge',
          `nodejs_version_info{version="$${process.version}"} 1`
        ].join('\n'));
      });

      app.get('/health', (req, res) => {
        res.json({ status: 'ok', timestamp: new Date().toISOString(), uptime: process.uptime() });
      });

      app.listen(PORT, '0.0.0.0', () => {
        console.log(`🚀 GitOps Platform v2.0.0 running on port $${PORT}`);
        console.log(`   Health: http://localhost:$${PORT}/health`);
        console.log(`   API:    http://localhost:$${PORT}/api/`);
      });
  - path: /opt/gitops-app/views/index.ejs
