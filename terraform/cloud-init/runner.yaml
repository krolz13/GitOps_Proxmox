#cloud-config
hostname: gitops-runner
manage_etc_hosts: true

users:
  - name: debian
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_public_key}

package_update: true

packages:
  - docker.io
  - curl
  - gnupg
  - qemu-guest-agent

runcmd:
  - systemctl start qemu-guest-agent
  - systemctl enable qemu-guest-agent
  - |
    # Add GitLab Runner repository
    curl -L "https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.deb.sh" | sudo bash
  - apt-get update && apt-get install -y gitlab-runner
  - |
    if [ -n "${gitlab_runner_token}" ] && [ "${gitlab_runner_token}" != "" ]; then
      gitlab-runner register --non-interactive --url "https://gitlab.com/" --registration-token "${gitlab_runner_token}" --executor "docker" --docker-image "docker:stable" --tag-list "proxmox,gitops" --run-untagged
    else
      echo "GitLab Runner token not provided, skipping registration"
    fi
  - systemctl enable --now gitlab-runner
  - systemctl enable --now docker

final_message: "GitLab Runner ready"