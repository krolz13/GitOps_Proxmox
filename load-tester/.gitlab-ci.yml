stages:
  - deploy

deploy_load_tester:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache rsync openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # Using the VM ID for the load tester from terraform script (VM 204 doesn't have fixed IP in CI yet, assuming same subnet, we might need a variable or script to find it, but let's assume DEPLOY_HOST_LOAD_TESTER is set or we use a convention)
    # Since we don't have the exact IP hardcoded, let's look it up or use a variable. For now, assuming standard setup.
    - ssh-keyscan $DEPLOY_HOST_LOAD_TESTER >> ~/.ssh/known_hosts || true
    - chmod 644 ~/.ssh/known_hosts
    
    # Sync application files to the server
    - rsync -avz --delete --exclude 'node_modules' --exclude '.npm' \
      ./load-tester/ $DEPLOY_USER@$DEPLOY_HOST_LOAD_TESTER:/opt/load-tester/
    
    # Install production dependencies and restart service
    - ssh $DEPLOY_USER@$DEPLOY_HOST_LOAD_TESTER "
        cd /opt/load-tester &&
        npm ci --production &&
        sudo systemctl restart gitops-load-tester &&
        sleep 3 &&
        systemctl is-active --quiet gitops-load-tester && echo 'Deployment successful!' || echo 'Deployment may have failed'
      "
  environment:
    name: load-tester
  when: manual
