# GitLab CI/CD Pipeline for GitOps App
# This pipeline builds and deploys the Node.js application to the App VM

stages:
  - build
  - test
  - deploy
  - load-test
  - notify

variables:
  # Docker registry (using GitLab container registry)
  DOCKER_REGISTRY: registry.gitlab.com
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  
  # Deployment targets
  DEPLOY_HOST: "192.168.8.195"
  DEPLOY_HOST_LOAD_TESTER: "192.168.8.197"
  DEPLOY_USER: "debian"
  DEPLOY_PATH: "/opt/gitops-app"
  
  # SSH key for deployment (stored in GitLab CI/CD variables)
  SSH_PRIVATE_KEY: "$SSH_PRIVATE_KEY"

# Cache npm dependencies
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/
    - node_modules/

before_script:
  - apt-get update -qq && apt-get install -y -qq openssh-client rsync
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts

build:
  stage: build
  image: node:18-alpine
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build 2>/dev/null || echo "No build script, skipping"
  artifacts:
    paths:
      - node_modules/
      - package-lock.json
    expire_in: 1 hour
  only:
    - main
    - develop
    - merge_requests

test:
  stage: test
  image: node:18-alpine
  script:
    - npm ci --cache .npm --prefer-offline
    - npm test 2>/dev/null || echo "No tests defined, skipping"
  only:
    - main
    - develop
    - merge_requests

deploy_staging:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache rsync openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    
    # Sync application files to the server
    - rsync -avz --delete --exclude '.git' --exclude 'node_modules' --exclude '.npm' \
      --exclude '.gitlab-ci.yml' --exclude '*.md' \
      ./ $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/
    
    # Install production dependencies and restart service
    - ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH &&
        npm ci --production &&
        sudo systemctl restart gitops-app &&
        sleep 3 &&
        curl -s http://localhost:3000/ | grep -q 'Welcome to GitOps App' && echo 'Deployment successful!' || echo 'Deployment may have failed'
      "
  environment:
    name: staging
    url: http://$DEPLOY_HOST:3000
  only:
    - develop
  when: manual

deploy_production:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache rsync openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    
    # Sync application files to the server
    - rsync -avz --delete --exclude '.git' --exclude 'node_modules' --exclude '.npm' \
      --exclude '.gitlab-ci.yml' --exclude '*.md' \
      ./ $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/
    
    # Install production dependencies and restart service
    - ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH &&
        npm ci --production &&
        sudo systemctl restart gitops-app &&
        sleep 3 &&
        curl -s http://localhost:3000/ | grep -q 'Welcome to GitOps App' && echo 'Deployment successful!' || echo 'Deployment may have failed'
      "
  environment:
    name: production
    url: http://$DEPLOY_HOST:3000
  only:
    - main
  when: manual

notify:
  stage: notify
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - |
      if [ "$CI_JOB_STATUS" == "success" ]; then
        STATUS="✅ Success"
      else
        STATUS="❌ Failed"
      fi
    - |
      curl -X POST -H "Content-Type: application/json" \
        -d "{\"text\":\"GitOps App Deployment $STATUS\nPipeline: $CI_PIPELINE_URL\nCommit: $CI_COMMIT_SHA\nBranch: $CI_COMMIT_REF_NAME\"}" \
        $SLACK_WEBHOOK_URL 2>/dev/null || echo "Slack notification skipped (no webhook configured)"
  when: always
  only:
    - main
    - develop

# Trigger pipeline for monitoring stack updates
trigger_monitoring:
  stage: deploy
  trigger:
    include: monitoring/.gitlab-ci.yml
  only:
    - main
  when: manual

# Trigger pipeline for load tester
trigger_load_tester:
  stage: deploy
  trigger:
    include: load-tester/.gitlab-ci.yml
  only:
    - main
  when: manual

# Run automated load test against the app
run_load_test:
  stage: load-test
  image: alpine:latest
  variables:
    LOAD_TEST_DURATION_SEC: 30
    LOAD_TEST_RPS: 50
  script:
    - apk add --no-cache curl jq
    
    # 1. Start the load test
    - echo "Starting load test on http://$DEPLOY_HOST:3000 at $LOAD_TEST_RPS RPS..."
    - |
      START_RESPONSE=$(curl -s -X POST -H "Content-Type: application/json" \
        -d "{\"targetUrl\":\"http://$DEPLOY_HOST:3000\",\"rate\":$LOAD_TEST_RPS}" \
        "http://$DEPLOY_HOST_LOAD_TESTER:3000/api/start")
    
    - echo "Start response: $START_RESPONSE"
    - |
      if [ "$(echo "$START_RESPONSE" | jq -r '.success')" != "true" ]; then
        echo "Failed to start load test!"
        exit 1
      fi
    
    # 2. Wait for the test duration
    - echo "Running load test for $LOAD_TEST_DURATION_SEC seconds..."
    - sleep $LOAD_TEST_DURATION_SEC
    
    # 3. Stop the load test
    - echo "Stopping load test..."
    - curl -s -X POST "http://$DEPLOY_HOST_LOAD_TESTER:3000/api/stop"
    
    # 4. Get and report metrics
    - echo "Retrieving load test metrics..."
    - STATUS_RESPONSE=$(curl -s "http://$DEPLOY_HOST_LOAD_TESTER:3000/api/status")
    - echo "Final Status: $STATUS_RESPONSE"
    
    # Extract metrics using jq
    - REQUESTS=$(echo "$STATUS_RESPONSE" | jq -r '.stats.requests // 0')
    - SUCCESSES=$(echo "$STATUS_RESPONSE" | jq -r '.stats.successes // 0')
    - ERRORS=$(echo "$STATUS_RESPONSE" | jq -r '.stats.errors // 0')
    - ERROR_RATE=$(echo "$STATUS_RESPONSE" | jq -r '.stats.errorRate // 0')
    - RPS=$(echo "$STATUS_RESPONSE" | jq -r '.stats.rps // 0')
    - AVG_LATENCY=$(echo "$STATUS_RESPONSE" | jq -r '.stats.latency.avg // 0')
    
    - echo "=========================================="
    - echo "             LOAD TEST RESULTS            "
    - echo "=========================================="
    - echo "Target URL:      http://$DEPLOY_HOST:3000"
    - echo "Total Requests:  $REQUESTS"
    - echo "Successes:       $SUCCESSES"
    - echo "Errors:          $ERRORS"
    - echo "Error Rate:      $ERROR_RATE%"
    - echo "Actual RPS:      $RPS"
    - echo "Avg Latency:     $AVG_LATENCY ms"
    - echo "=========================================="
    
    # Fail job if error rate exceeds 5%
    - |
      if [ "$(echo "$ERROR_RATE" | cut -d. -f1)" -ge 5 ]; then
        echo "ERROR: Load test failed! Error rate ($ERROR_RATE%) is above threshold of 5%."
        exit 1
      fi
    - echo "Load test passed successfully!"
  only:
    - develop
    - main
  when: manual