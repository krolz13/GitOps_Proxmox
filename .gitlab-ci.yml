# GitLab CI/CD Pipeline for GitOps App
# This pipeline builds and deploys the Node.js application to the App VM

stages:
  - build
  - test
  - deploy
  - notify

variables:
  # Docker registry (using GitLab container registry)
  DOCKER_REGISTRY: registry.gitlab.com
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  
  # Deployment target
  DEPLOY_HOST: "192.168.8.189"
  DEPLOY_USER: "debian"
  DEPLOY_PATH: "/opt/gitops-app"
  
  # SSH key for deployment (stored in GitLab CI/CD variables)
  SSH_PRIVATE_KEY: "$SSH_PRIVATE_KEY"

# Cache npm dependencies
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/
    - node_modules/

before_script:
  - apt-get update -qq && apt-get install -y -qq openssh-client rsync
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts

build:
  stage: build
  image: node:18-alpine
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build 2>/dev/null || echo "No build script, skipping"
  artifacts:
    paths:
      - node_modules/
      - package-lock.json
    expire_in: 1 hour
  only:
    - main
    - develop
    - merge_requests

test:
  stage: test
  image: node:18-alpine
  script:
    - npm ci --cache .npm --prefer-offline
    - npm test 2>/dev/null || echo "No tests defined, skipping"
  only:
    - main
    - develop
    - merge_requests

deploy_staging:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache rsync openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    
    # Sync application files to the server
    - rsync -avz --delete --exclude '.git' --exclude 'node_modules' --exclude '.npm' \
      --exclude '.gitlab-ci.yml' --exclude '*.md' \
      ./ $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/
    
    # Install production dependencies and restart service
    - ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH &&
        npm ci --production &&
        sudo systemctl restart gitops-app &&
        sleep 3 &&
        curl -s http://localhost:3000/ | grep -q 'Welcome to GitOps App' && echo 'Deployment successful!' || echo 'Deployment may have failed'
      "
  environment:
    name: staging
    url: http://192.168.8.189:3000
  only:
    - develop
  when: manual

deploy_production:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache rsync openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    
    # Sync application files to the server
    - rsync -avz --delete --exclude '.git' --exclude 'node_modules' --exclude '.npm' \
      --exclude '.gitlab-ci.yml' --exclude '*.md' \
      ./ $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/
    
    # Install production dependencies and restart service
    - ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH &&
        npm ci --production &&
        sudo systemctl restart gitops-app &&
        sleep 3 &&
        curl -s http://localhost:3000/ | grep -q 'Welcome to GitOps App' && echo 'Deployment successful!' || echo 'Deployment may have failed'
      "
  environment:
    name: production
    url: http://192.168.8.189:3000
  only:
    - main
  when: manual

notify:
  stage: notify
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - |
      if [ "$CI_JOB_STATUS" == "success" ]; then
        STATUS="✅ Success"
      else
        STATUS="❌ Failed"
      fi
    - |
      curl -X POST -H "Content-Type: application/json" \
        -d "{\"text\":\"GitOps App Deployment $STATUS\nPipeline: $CI_PIPELINE_URL\nCommit: $CI_COMMIT_SHA\nBranch: $CI_COMMIT_REF_NAME\"}" \
        $SLACK_WEBHOOK_URL 2>/dev/null || echo "Slack notification skipped (no webhook configured)"
  when: always
  only:
    - main
    - develop

# Trigger pipeline for monitoring stack updates
trigger_monitoring:
  stage: deploy
  trigger:
    include: monitoring/.gitlab-ci.yml
  only:
    - main
  when: manual